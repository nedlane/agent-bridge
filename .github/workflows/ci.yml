name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes jq shellcheck

      - name: Validate Bash syntax
        run: |
          for f in bin/*; do
            head -1 "$f" | grep -qE 'python' && continue
            bash -n "$f"
          done

      - name: ShellCheck (shell tools only)
        run: |
          for f in bin/*; do
            head -1 "$f" | grep -qE 'zsh|python' && continue
            shellcheck "$f"
          done

      - name: Validate agent-bridge Python syntax
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m py_compile bin/agent-bridge

      - name: Validate profile JSON
        run: |
          for f in claude-profiles/*.json; do
            jq empty "$f"
          done

      - name: Unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Ruff (Python error lint)
        run: |
          pip install ruff
          # Pass bin/agent-bridge explicitly: ruff lints files given by path
          # regardless of extension, so the extensionless script is covered.
          # E9/F63/F7/F82 catch real errors (syntax, undefined names,
          # f-string/assert bugs) only — no style noise, so CI never reddens
          # over formatting.
          ruff check --select E9,F63,F7,F82 bin/agent-bridge tests
